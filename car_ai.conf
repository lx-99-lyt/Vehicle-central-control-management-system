# 智能车载 AI 配置文件模板
# 复制此文件为 car_ai.conf，填写 api_key 后即可使用
# 注意：car_ai.conf 已加入 .gitignore，请勿提交真实 Key

# ── 必填 ────────────────────────────────────────────────
# 你的 API Key
api_key = 你的 API Key

# ── 模型（可选）────────────────────────────────────────
# 填写你所用平台对应的模型名，默认 deepseek-v4-flash
#
# DeepSeek：
#   deepseek-v4-flash（快，推荐车载）
#   deepseek-v4-pro
#
# OpenAI：
#   gpt-4o-mini（快）
#   gpt-4o
#   gpt-4.1
#
# Anthropic Claude：
#   claude-haiku-4-5-20251001（快）
#   claude-sonnet-4-6
#   claude-opus-4-6
#
# 阿里云百炼（通义千问）：
#   qwen-turbo（快）
#   qwen-plus
#   qwen-max
#
# Google Gemini：
#   gemini-2.0-flash（快）
#   gemini-2.5-pro
#
model = deepseek-v4-flash

# ── API 接口地址（可选）────────────────────────────────
# 填写你所用平台的 Chat Completions 端点，默认 DeepSeek 官方
#
# DeepSeek：  https://api.deepseek.com/chat/completions
# OpenAI：    https://api.openai.com/v1/chat/completions
# 阿里云：    https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
# Google：    https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
# 本地代理：  http://localhost:11434/v1/chat/completions（Ollama 等）
#
api_url = https://api.deepseek.com/chat/completions
